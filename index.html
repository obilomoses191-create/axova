<style>
/* ── RESET & BASE ─────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --void:#03040a;
  --deep:#070b18;
  --panel:rgba(255,255,255,.03);
  --glass:rgba(255,255,255,.06);
  --rim:rgba(255,255,255,.09);
  --gold:#e2b96a;
  --gold2:#f5d48a;
  --teal:#00d4c8;
  --teal2:#4ffff5;
  --white:#f0eeea;
  --muted:rgba(240,238,234,.4);
  --danger:#ff5757;
}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{
  background:var(--void);color:var(--white);
  font-family:'DM Sans',sans-serif;font-weight:300;
  overflow-x:hidden;min-height:100vh;cursor:none;
}

/* ── CURSOR ───────────────────────────────────────────── */
#cur{
  position:fixed;width:8px;height:8px;border-radius:50%;
  background:var(--teal);pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);mix-blend-mode:screen;
  transition:width .15s,height .15s;
}
#cur-ring{
  position:fixed;width:40px;height:40px;border-radius:50%;
  border:1px solid rgba(0,212,200,.35);pointer-events:none;z-index:9998;
  transform:translate(-50%,-50%);transition:width .3s,height .3s,opacity .3s;
}

/* ── CANVAS STARS ─────────────────────────────────────── */
#starfield{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ── NAV ──────────────────────────────────────────────── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:500;
  display:flex;align-items:center;justify-content:space-between;
  padding:1.4rem 4rem;
  transition:background .5s,border-color .5s,backdrop-filter .5s;
  border-bottom:1px solid transparent;
}
nav.stuck{
  background:rgba(3,4,10,.8);backdrop-filter:blur(20px);
  border-color:var(--rim);
}
.nav-logo{
  font-family:'Instrument Serif',serif;font-size:1.5rem;font-style:italic;
  background:linear-gradient(135deg,var(--gold),var(--teal));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-decoration:none;letter-spacing:-.02em;
}
.nav-right{display:flex;align-items:center;gap:2rem}
.nav-link{font-size:.78rem;color:var(--muted);text-decoration:none;letter-spacing:.06em;transition:color .2s}
.nav-link:hover{color:var(--white)}
.nav-btn{
  font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:.1em;
  border:1px solid rgba(0,212,200,.3);color:var(--teal);
  background:rgba(0,212,200,.06);padding:.6rem 1.4rem;cursor:none;
  transition:all .2s;
}
.nav-btn:hover{background:rgba(0,212,200,.15);border-color:var(--teal);box-shadow:0 0 20px rgba(0,212,200,.2)}

/* ── HERO ─────────────────────────────────────────────── */
.hero{
  position:relative;z-index:1;min-height:100vh;
  display:flex;flex-direction:column;justify-content:center;
  padding:0 4rem;overflow:hidden;
}
.hero-glow{
  position:absolute;top:20%;left:50%;transform:translateX(-50%);
  width:900px;height:600px;
  background:radial-gradient(ellipse,rgba(0,212,200,.08) 0%,transparent 65%);
  pointer-events:none;
}
.hero-glow2{
  position:absolute;bottom:-10%;right:-10%;
  width:600px;height:600px;
  background:radial-gradient(ellipse,rgba(226,185,106,.06) 0%,transparent 65%);
  pointer-events:none;
}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:.8rem;
  font-family:'Space Mono',monospace;font-size:.62rem;letter-spacing:.18em;
  color:var(--teal);border:1px solid rgba(0,212,200,.2);
  padding:.45rem 1rem;width:fit-content;margin-bottom:2.5rem;
  background:rgba(0,212,200,.04);
  opacity:0;animation:rise .8s .1s ease forwards;
}
.hero-eyebrow::before{
  content:'';width:6px;height:6px;background:var(--teal);border-radius:50%;
  animation:ping 2s infinite;
}
@keyframes ping{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:.4}}
@keyframes rise{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}

.hero-title{
  font-family:'Instrument Serif',serif;font-weight:400;
  font-size:clamp(3.8rem,8.5vw,9rem);line-height:.92;
  letter-spacing:-.04em;max-width:1000px;
  opacity:0;animation:rise .9s .2s ease forwards;
}
.hero-title .line1{display:block}
.hero-title .line2{display:block;font-style:italic;
  background:linear-gradient(90deg,var(--gold),var(--teal2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.hero-title .line3{display:block;color:var(--muted)}

.hero-sub{
  font-size:1rem;color:var(--muted);line-height:1.85;
  max-width:460px;margin-top:2.5rem;font-weight:300;
  opacity:0;animation:rise .9s .35s ease forwards;
}

.hero-actions{
  display:flex;align-items:center;gap:2.5rem;margin-top:3rem;
  opacity:0;animation:rise .9s .5s ease forwards;
}
.btn-hero{
  font-family:'Space Mono',monospace;font-size:.72rem;letter-spacing:.1em;
  background:linear-gradient(135deg,var(--teal),var(--gold));
  color:var(--void);border:none;padding:1rem 2.4rem;cursor:none;
  font-weight:700;transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden;
}
.btn-hero::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.15);opacity:0;transition:opacity .2s}
.btn-hero:hover{transform:translateY(-3px);box-shadow:0 20px 40px rgba(0,212,200,.3)}
.btn-hero:hover::after{opacity:1}
.hero-hint{font-size:.7rem;color:var(--muted);letter-spacing:.06em}

/* ── FLOATING STATS ───────────────────────────────────── */
.hero-stats{
  display:flex;gap:3rem;margin-top:4.5rem;padding-top:3rem;
  border-top:1px solid var(--rim);
  opacity:0;animation:rise .9s .65s ease forwards;
}
.stat-num{
  font-family:'Instrument Serif',serif;font-size:2.8rem;font-style:italic;
  background:linear-gradient(135deg,var(--white),var(--muted));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.stat-num span{color:var(--teal);-webkit-text-fill-color:var(--teal)}
.stat-label{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:.3rem}

/* ── SCROLL TICKER ────────────────────────────────────── */
.ticker{
  position:relative;z-index:1;padding:1rem 0;
  border-top:1px solid var(--rim);border-bottom:1px solid var(--rim);
  overflow:hidden;background:rgba(0,212,200,.02);
}
.ticker-track{
  display:inline-block;white-space:nowrap;
  animation:scroll 35s linear infinite;
  font-family:'Space Mono',monospace;font-size:.62rem;
  letter-spacing:.15em;text-transform:uppercase;color:rgba(0,212,200,.4);
}
.ticker-track span{margin:0 2.5rem}
@keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* ── SECTION BASE ─────────────────────────────────────── */
.section{position:relative;z-index:1;padding:8rem 4rem}
.section-tag{
  font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.2em;
  text-transform:uppercase;color:var(--teal);margin-bottom:1.2rem;
}
.section-title{
  font-family:'Instrument Serif',serif;font-size:clamp(2.4rem,4.5vw,4rem);
  font-weight:400;line-height:1.05;letter-spacing:-.03em;margin-bottom:1.5rem;
}
.section-title em{font-style:italic;
  background:linear-gradient(90deg,var(--gold),var(--teal2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}

/* ── FEATURE BENTO ────────────────────────────────────── */
.bento{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--rim);margin-top:4rem}
.bento-card{
  background:var(--deep);padding:2.8rem;
  transition:background .3s;position:relative;overflow:hidden;
  opacity:0;transform:translateY(30px);transition:opacity .6s,transform .6s,background .3s;
}
.bento-card.visible{opacity:1;transform:none}
.bento-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--teal),transparent);
  opacity:0;transition:opacity .3s;
}
.bento-card:hover{background:rgba(0,212,200,.04)}
.bento-card:hover::before{opacity:1}
.bento-num{
  font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.15em;
  color:rgba(0,212,200,.35);margin-bottom:2rem;
}
.bento-icon{
  width:44px;height:44px;border:1px solid var(--rim);
  display:flex;align-items:center;justify-content:center;
  font-size:1.3rem;margin-bottom:1.5rem;
  background:var(--panel);
}
.bento-title{font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:500;margin-bottom:.7rem}
.bento-desc{font-size:.82rem;color:var(--muted);line-height:1.85}

/* ── HOW IT WORKS ─────────────────────────────────────── */
.how-wrap{display:grid;grid-template-columns:1fr 1fr;gap:6rem;align-items:start;margin-top:4rem}
.how-steps{display:flex;flex-direction:column;gap:0}
.how-step{
  display:flex;gap:2rem;padding:2.2rem 0;border-bottom:1px solid var(--rim);
  opacity:0;transform:translateX(-20px);transition:opacity .6s,transform .6s;
}
.how-step.visible{opacity:1;transform:none}
.how-step:first-child{border-top:1px solid var(--rim)}
.step-n{
  font-family:'Instrument Serif',serif;font-size:3rem;font-style:italic;
  color:var(--rim);line-height:1;min-width:50px;transition:color .3s;
}
.how-step:hover .step-n{color:var(--teal)}
.step-content h3{font-size:.95rem;font-weight:500;margin-bottom:.5rem}
.step-content p{font-size:.8rem;color:var(--muted);line-height:1.8}

.terminal{
  background:var(--deep);border:1px solid var(--rim);padding:0;
  font-family:'Space Mono',monospace;font-size:.72rem;overflow:hidden;
  position:sticky;top:100px;
  opacity:0;transform:translateY(20px);transition:opacity .7s .2s,transform .7s .2s;
}
.terminal.visible{opacity:1;transform:none}
.term-bar{
  background:rgba(255,255,255,.04);padding:.7rem 1rem;
  display:flex;align-items:center;gap:.5rem;border-bottom:1px solid var(--rim);
}
.term-dot{width:10px;height:10px;border-radius:50%}
.term-body{padding:1.5rem;color:rgba(240,238,234,.55);line-height:2}
.t-key{color:var(--teal)}
.t-val{color:var(--white)}
.t-dim{color:rgba(240,238,234,.3)}
.t-ok{color:#4dff9b}
.t-bar{height:3px;background:var(--rim);margin:.3rem 0 1rem;overflow:hidden}
.t-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--gold));animation:tfill 2.5s ease infinite alternate}
@keyframes tfill{from{width:35%}to{width:95%}}
.t-blink{animation:tblink 1s step-end infinite}
@keyframes tblink{0%,100%{opacity:1}50%{opacity:0}}

/* ── WAITLIST SECTION ─────────────────────────────────── */
.wl-section{
  position:relative;z-index:1;padding:10rem 4rem;
  background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(0,212,200,.05),transparent 70%);
  border-top:1px solid var(--rim);text-align:center;
}
.wl-section h2{max-width:none;margin-bottom:1rem}
.wl-lead{font-size:.9rem;color:var(--muted);max-width:440px;margin:0 auto;line-height:1.9}

/* ── SETUP BANNER ─────────────────────────────────────── */
.setup-banner{
  display:none;max-width:680px;margin:2rem auto 0;
  background:rgba(226,185,106,.06);border:1px solid rgba(226,185,106,.25);
  padding:2rem;text-align:left;
}
.setup-banner h4{font-family:'Space Mono',monospace;font-size:.72rem;letter-spacing:.1em;color:var(--gold);margin-bottom:1rem}
.setup-step{font-size:.78rem;color:var(--muted);line-height:1.8;margin-bottom:.5rem;display:flex;gap:.8rem}
.setup-step span{color:var(--gold);min-width:20px;font-family:'Space Mono',monospace}
.setup-banner a{color:var(--teal);text-decoration:underline}
.setup-banner code{
  background:rgba(0,212,200,.1);color:var(--teal);
  padding:.1rem .4rem;font-family:'Space Mono',monospace;font-size:.72rem;
}

/* ── MULTI-STEP FORM ──────────────────────────────────── */
.wl-card{
  max-width:520px;margin:3rem auto 0;
  background:var(--panel);border:1px solid var(--rim);
  backdrop-filter:blur(20px);padding:3rem;
  position:relative;overflow:hidden;
}
.wl-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--teal),var(--gold),transparent);
}

/* progress bar */
.progress{display:flex;gap:6px;margin-bottom:2.5rem}
.prog-dot{
  height:3px;flex:1;background:var(--rim);transition:background .4s;
}
.prog-dot.done{background:var(--teal)}
.prog-dot.active{background:linear-gradient(90deg,var(--teal),var(--gold))}

/* step panels */
.step-panel{display:none}
.step-panel.active{display:block;animation:fadeStep .4s ease}
@keyframes fadeStep{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

.step-label{
  font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.15em;
  text-transform:uppercase;color:var(--teal);margin-bottom:.6rem;
}
.step-title{font-family:'Instrument Serif',serif;font-size:1.6rem;font-weight:400;margin-bottom:.5rem}
.step-sub{font-size:.78rem;color:var(--muted);line-height:1.8;margin-bottom:2rem}
.step-sub strong{color:var(--gold)}

/* input */
.field{display:flex;flex-direction:column;gap:0}
.field-row{display:flex;gap:0;border:1px solid var(--rim);transition:border-color .2s}
.field-row:focus-within{border-color:rgba(0,212,200,.5)}
.field-input{
  flex:1;background:transparent;border:none;outline:none;
  font-family:'DM Sans',sans-serif;font-size:.88rem;
  color:var(--white);padding:1rem 1.2rem;
}
.field-input::placeholder{color:rgba(240,238,234,.25)}
.field-btn{
  font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:.1em;
  background:linear-gradient(135deg,var(--teal),var(--gold));
  color:var(--void);border:none;padding:1rem 1.5rem;cursor:none;
  font-weight:700;transition:opacity .2s;white-space:nowrap;
}
.field-btn:disabled{opacity:.5;cursor:not-allowed}

/* OTP input */
.otp-wrap{display:flex;gap:.6rem;justify-content:center;margin:1.5rem 0}
.otp-digit{
  width:52px;height:64px;background:var(--panel);border:1px solid var(--rim);
  font-family:'Space Mono',monospace;font-size:1.6rem;font-weight:700;
  color:var(--white);text-align:center;outline:none;transition:border-color .2s;
}
.otp-digit:focus{border-color:var(--teal)}
.otp-digit.filled{border-color:rgba(0,212,200,.4)}
.otp-actions{display:flex;flex-direction:column;gap:.8rem}
.otp-submit{
  font-family:'Space Mono',monospace;font-size:.7rem;letter-spacing:.1em;
  background:linear-gradient(135deg,var(--teal),var(--gold));
  color:var(--void);border:none;padding:1rem;cursor:none;
  font-weight:700;width:100%;transition:opacity .2s,transform .15s;
}
.otp-submit:hover:not(:disabled){transform:translateY(-2px)}
.otp-submit:disabled{opacity:.5}
.otp-resend{
  font-family:'Space Mono',monospace;font-size:.62rem;letter-spacing:.08em;
  background:none;border:1px solid var(--rim);color:var(--muted);
  padding:.7rem;cursor:none;transition:all .2s;
}
.otp-resend:hover:not(:disabled){border-color:var(--teal);color:var(--teal)}
.otp-resend:disabled{opacity:.4}
.countdown{font-family:'Space Mono',monospace;font-size:.65rem;color:var(--muted);text-align:center;margin-top:.6rem}

/* error / info inline */
.inline-msg{
  display:none;font-size:.75rem;padding:.8rem 1rem;margin-top:.8rem;
  border-left:2px solid;line-height:1.7;
}
.inline-msg.error{background:rgba(255,87,87,.08);border-color:var(--danger);color:#ff9999}
.inline-msg.info{background:rgba(0,212,200,.06);border-color:var(--teal);color:rgba(240,238,234,.7)}
.inline-msg.show{display:block}

/* test-mode pill */
.test-pill{
  display:none;background:rgba(226,185,106,.1);border:1px solid rgba(226,185,106,.3);
  padding:.6rem 1rem;margin-bottom:1.5rem;font-size:.72rem;color:var(--gold);
  font-family:'Space Mono',monospace;letter-spacing:.06em;
}

/* success step */
.success-icon{
  width:64px;height:64px;border-radius:50%;
  background:linear-gradient(135deg,rgba(0,212,200,.15),rgba(226,185,106,.15));
  border:1px solid rgba(0,212,200,.3);
  display:flex;align-items:center;justify-content:center;
  font-size:1.8rem;margin:0 auto 1.5rem;animation:popIn .5s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}
.next-steps-list{display:flex;flex-direction:column;gap:0;margin-top:1.5rem;border-top:1px solid var(--rim)}
.ns{display:flex;gap:1.2rem;padding:1.2rem 0;border-bottom:1px solid var(--rim);align-items:flex-start}
.ns-i{font-size:1.1rem;min-width:28px;margin-top:.1rem}
.ns-t{font-size:.82rem;font-weight:500;margin-bottom:.3rem}
.ns-d{font-size:.75rem;color:var(--muted);line-height:1.75}
.contact-row{display:flex;gap:.8rem;flex-wrap:wrap;margin-top:2rem;padding-top:1.5rem;border-top:1px solid var(--rim)}
.c-pill{
  font-size:.7rem;border:1px solid var(--rim);
  padding:.5rem 1rem;color:var(--teal);text-decoration:none;
  letter-spacing:.05em;transition:all .2s;cursor:none;
}
.c-pill:hover{background:rgba(0,212,200,.1);border-color:var(--teal)}
.count-row{font-family:'Space Mono',monospace;font-size:.65rem;color:var(--muted);margin-top:2rem;letter-spacing:.08em}
.count-row span{color:var(--gold)}

/* ── HELP ─────────────────────────────────────────────── */
.help-section{
  position:relative;z-index:1;padding:6rem 4rem;
  background:var(--deep);border-top:1px solid var(--rim);text-align:center;
}
.help-cards{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--rim);max-width:680px;margin:2.5rem auto 0}
.help-card{
  background:var(--deep);padding:2.5rem 2rem;text-decoration:none;
  display:block;transition:background .3s;position:relative;overflow:hidden;
}
.help-card::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at var(--mx,50%) var(--my,50%),rgba(0,212,200,.06),transparent 60%);opacity:0;transition:opacity .3s}
.help-card:hover{background:rgba(0,212,200,.03)}
.help-card:hover::after{opacity:1}
.help-icon{font-size:1.8rem;margin-bottom:1rem}
.help-label{font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.15em;text-transform:uppercase;color:var(--teal);margin-bottom:.5rem}
.help-val{font-size:.92rem;font-weight:500;color:var(--white);margin-bottom:.4rem}
.help-note{font-size:.68rem;color:var(--muted);letter-spacing:.05em}

/* ── FOOTER ───────────────────────────────────────────── */
footer{
  position:relative;z-index:1;padding:2rem 4rem;
  border-top:1px solid var(--rim);
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;
  background:var(--void);
}
footer p{font-size:.65rem;color:rgba(240,238,234,.2);letter-spacing:.06em}
footer a{font-size:.65rem;color:rgba(240,238,234,.25);text-decoration:none;letter-spacing:.05em;transition:color .2s}
footer a:hover{color:var(--teal)}

/* ── REVEAL ───────────────────────────────────────────── */
.reveal{opacity:0;transform:translateY(28px);transition:opacity .7s ease,transform .7s ease}
.reveal.visible{opacity:1;transform:none}

/* ──
